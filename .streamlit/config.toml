[server]
maxUploadSize = 200
maxMessageSize = 200
enableXsrfProtection = false

[browser]
serverAddress = "localhost"
gatherUsageStats = false

[runner]
fastReruns = true

[client]
showErrorDetails = true

[theme]
base = "dark"
primaryColor = "#06b6d4"
backgroundColor = "#0a0e1a"
secondaryBackgroundColor = "#111827"
textColor = "#e8ecf4"
font = "sans serif"
